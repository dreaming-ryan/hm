<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랜덤 퀴즈 — 위험물산업기사 필기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F2;--surface:#FFFFFF;--border:#E1E5DE;--border2:#D4D8D0;
  --text-main:#1F2421;--text-sub:#5F6B63;--text-muted:#9BA69F;
  --point:#0F766E;--point-l:#E0F5F2;
  --blue:#1A5F9E;--blue-l:#E4EEF8;
  --green:#2E6B3A;--green-l:#E6F0E8;
  --sub1:#6B3FA0;--sub1-l:#EFE6F7;
  --sub2:#C2410C;--sub2-l:#FFE7D6;
  --sub3:#8B2635;--sub3-l:#F5E8EA;
  --red:#B91C1C;--red-l:#FEE2E2;
  --amber:#E0A800;--amber-l:#FFF8E6;
  --r-lg:18px;--r-md:12px;--r-sm:8px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 20px rgba(0,0,0,.09);--sh-lg:0 12px 40px rgba(0,0,0,.12)
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;align-items:center;line-height:1.7}
.site-header{width:100%;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:500;color:var(--text-sub);padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all .15s;flex-shrink:0}
.back-btn:hover{color:var(--text-main);border-color:#ccc}
.header-title{font-size:15px;font-weight:600;color:var(--text-main)}
.header-badge{margin-left:auto;font-size:12px;font-weight:500;color:var(--blue);background:var(--blue-l);padding:4px 12px;border-radius:20px}
.main{width:100%;max-width:720px;padding:2.5rem 1.5rem 6rem;flex:1}
.page-hero{margin-bottom:2rem;animation:fadeUp .5s ease both}
.page-hero h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:5px}
.page-hero p{font-size:13px;color:var(--text-sub)}

.filter-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:1.1rem 1.4rem;margin-bottom:1rem;animation:fadeUp .5s .05s ease both}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:.6rem}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;min-width:46px;flex-shrink:0}
.tag{font-size:12px;padding:5px 13px;border-radius:20px;background:var(--surface);color:var(--text-sub);border:1px solid var(--border2);cursor:pointer;transition:all .15s;user-select:none;font-weight:500}
.tag:hover{border-color:var(--blue);color:var(--blue)}
.tag.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.progress-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem 1.4rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:14px;animation:fadeUp .5s .1s ease both}
.progress-info{font-size:12px;color:var(--text-sub);flex-shrink:0;min-width:110px}
.progress-info strong{color:var(--text-main);font-weight:700;font-size:14px}
.progress-track{flex:1;background:#F0F2EE;border-radius:10px;height:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:10px;transition:width .4s ease;width:0%}
.progress-pool{font-size:11px;color:var(--text-muted);flex-shrink:0}

.quiz-area{animation:fadeUp .5s .15s ease both}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.8rem 1.6rem 1.6rem;box-shadow:var(--sh-sm);margin-bottom:1rem}
.quiz-card.card--notice{background:#FFF8E6;border-color:#E0A800;border-left:5px solid #E0A800}
.q-notice{display:flex;align-items:flex-start;gap:8px;background:#FFF3CD;border:1px solid #FFE69C;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.6;color:#6E4A00}
.q-notice::before{content:'\26A0';flex-shrink:0;font-size:16px;color:#B57F00;line-height:1.2}
.q-notice strong{color:#8B5C00;font-weight:700}

.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.meta-round{font-size:11px;font-weight:600;color:var(--point);background:var(--point-l);padding:3px 10px;border-radius:6px}
.meta-subject{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px}
.meta-subject.s1{color:var(--sub1);background:var(--sub1-l)}
.meta-subject.s2{color:var(--sub2);background:var(--sub2-l)}
.meta-subject.s3{color:var(--sub3);background:var(--sub3-l)}
.meta-no{font-size:11px;color:var(--text-muted);margin-left:auto}

.q-text{font-size:15px;font-weight:600;color:var(--text-main);line-height:1.7;margin-bottom:1rem;letter-spacing:-.01em}
.q-text strong{color:var(--text-main);font-weight:700}
.q-sub{background:#F4F7F2;border-left:3px solid #BDD0B7;padding:.8rem 1rem;margin-bottom:1rem;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.75;color:var(--text-sub);white-space:pre-wrap}
.q-sub--svg{white-space:normal;text-align:center;padding:14px}
.q-sub--svg svg, .q-sub img{max-width:100%;height:auto;display:inline-block}

.choices{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:1.3rem}
.choice{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;font-size:13.5px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;line-height:1.6}
.choice:hover{border-color:var(--blue);background:var(--blue-l)}
.choice.selected{border-color:var(--blue);background:var(--blue-l)}
.choice__num{font-family:'Noto Serif KR',serif;font-weight:700;color:var(--text-sub);font-size:15px;min-width:20px;flex-shrink:0}
.choice__body{flex:1;color:var(--text-main)}
.choice__body img{max-width:100%;height:auto;display:block}
.card.revealed .choice{cursor:default}
.card.revealed .choice:hover{border-color:var(--border);background:var(--surface)}
.card.revealed .choice.is-correct{border-color:var(--green);background:var(--green-l)}
.card.revealed .choice.is-correct .choice__num{color:var(--green)}
.card.revealed .choice.is-correct:hover{border-color:var(--green);background:var(--green-l)}
.card.revealed .choice.selected.is-wrong{border-color:var(--red);background:var(--red-l)}
.card.revealed .choice.selected.is-wrong .choice__num{color:var(--red)}

.card-actions{display:flex;gap:10px;margin-top:1.2rem}
.btn-check,.btn-skip,.btn-next{flex:1;padding:.85rem 1.4rem;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-check{background:var(--point);color:#fff}
.btn-check:hover:not(:disabled){background:#0B5C55;transform:translateY(-1px)}
.btn-check:disabled{background:#cdd5cf;color:#fff;cursor:not-allowed;opacity:.7}
.btn-skip{background:transparent;color:var(--text-sub);border:1.5px solid var(--border2)}
.btn-skip:hover{border-color:var(--text-sub);color:var(--text-main)}
.btn-next{background:var(--blue);color:#fff}
.btn-next:hover{background:#154d84;transform:translateY(-1px)}

.answer-wrap{border-top:1px dashed var(--border2);margin-top:1.2rem;padding-top:1.2rem;display:none}
.answer-wrap.open{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.answer-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--point);margin-bottom:10px}
.answer-val{background:var(--point-l);border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;font-weight:700;color:var(--point);font-size:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.6}
.answer-val__num{font-family:'Noto Serif KR',serif;font-size:18px;flex-shrink:0}
.answer-val img{max-width:200px;height:auto}
.exp-section{margin-bottom:1.2rem}
.exp-section-label{font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.exp-section-label::before{content:'';width:14px;height:2px;background:var(--green);display:inline-block}
.exp-body{background:#f8fbf8;border-left:3px solid var(--green);padding:.9rem 1.1rem;border-radius:0 8px 8px 0;font-size:13px;line-height:1.85;color:var(--text-main)}
.exp-body p{margin-bottom:.55rem}
.exp-body p:last-child{margin-bottom:0}
.exp-body strong{color:var(--green);font-weight:700}
.exp-body em{color:var(--point);font-style:italic}
.exp-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.exp-body table th,.exp-body table td{border:1px solid var(--border);padding:6px 10px;text-align:center;line-height:1.6}
.exp-body table th{background:var(--green-l);color:var(--green);font-weight:700;font-size:11.5px}
.exp-body .warn{background:var(--point-l);border-left:3px solid var(--point);padding:8px 12px;margin:8px 0;border-radius:0 4px 4px 0;color:var(--text-main);font-size:12.5px}
.exp-body .warn strong{color:var(--point)}
.exp-body img{max-width:100%;height:auto}

.keyword-section{background:#FAFBF9;border-radius:8px;padding:.9rem 1.1rem;margin-top:1rem}
.keyword-group{margin-bottom:.8rem}
.keyword-group:last-child{margin-bottom:0}
.keyword-label{font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:6px}
.keyword-pills{display:flex;flex-wrap:wrap;gap:6px}
.kw-pill{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--green);font-weight:500}

.done-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:2.5rem 1.8rem;text-align:center;display:none;animation:fadeUp .5s ease both;box-shadow:var(--sh-sm)}
.done-card.show{display:block}
.done-icon{font-size:48px;margin-bottom:1rem}
.done-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:.5rem}
.done-desc{font-size:13px;color:var(--text-sub);margin-bottom:1.5rem;white-space:pre-wrap}
.done-btn{padding:.85rem 2rem;background:var(--point);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.done-btn:hover{background:#0B5C55}

.empty-msg{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r-md);padding:2rem 1.5rem;text-align:center;color:var(--text-muted);font-size:13px;display:none}
.empty-msg.show{display:block}

.loading-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem 1.6rem;box-shadow:var(--sh-sm);text-align:center;color:var(--text-muted);font-size:13px}
.skel{display:inline-block;background:linear-gradient(90deg,#e0e5dc 25%,#f4f7f2 50%,#e0e5dc 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;vertical-align:middle}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.footer{text-align:center;font-size:12px;color:var(--text-muted);padding:1.5rem;border-top:1px solid var(--border);width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.pdf-btn-wrap{display:flex;justify-content:center;margin-bottom:2rem;animation:fadeUp .5s .08s ease both}
.pdf-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:50px;background:linear-gradient(135deg,#0F766E 0%,#0B5C55 100%);color:#fff;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:-.02em;box-shadow:0 4px 18px rgba(15,118,110,.38);transition:all .22s ease;white-space:nowrap;text-align:left}
.pdf-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,118,110,.50);filter:brightness(1.07)}
.pdf-btn:active{transform:translateY(0);box-shadow:0 3px 10px rgba(15,118,110,.30)}
.pdf-btn-icon{font-size:18px;line-height:1;flex-shrink:0}
@media(max-width:480px){
  .card-actions{flex-direction:column}
  .progress-bar-wrap{flex-wrap:wrap}
  .progress-track{order:3;flex-basis:100%;margin-top:6px}
}
</style>
</head>
<body>
<header class="site-header">
  <a class="back-btn" href="index.html">← 홈</a>
  <span class="header-title">🎲 전체문제 랜덤 퀴즈</span>
  <span class="header-badge" id="header-badge">로딩 중…</span>
</header>

<main class="main">
  <div class="page-hero">
    <h1>랜덤 퀴즈로 실력 점검</h1>
    <p>전 회차 기출문제를 무작위로 한 문제씩 출제해요. 취약 영역을 파악하기에 좋습니다.</p>
  </div>

  <!-- PDF 요약노트 다운로드 버튼 -->
  <div class="pdf-btn-wrap">
    <a class="pdf-btn"
       href="https://dreaming-ryan.com/home?product=%EC%9C%84%ED%97%98%EB%AC%BC%EC%82%B0%EC%97%85%EA%B8%B0%EC%82%AC%20%EC%9A%94%EC%95%BD%EB%85%B8%ED%8A%B8%20PDF%20(%ED%95%84%EA%B8%B0)"
       target="_blank"
       rel="noopener noreferrer">
      <span class="pdf-btn-icon">📙</span>
      <span style="display:flex;flex-direction:column;align-items:flex-start;gap:2px">
        <span>위산기 필기 요약노트 PDF</span>
        <span style="font-size:13px;font-weight:500;opacity:.9">무료 다운받기</span>
      </span>
    </a>
  </div>

  <!-- 필터 -->
  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">연도</span>
      <div id="filter-year" style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="tag active" data-value="all">전체</div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">회차</span>
      <div id="filter-round" style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="tag active" data-value="all">전체</div>
        <div class="tag" data-value="1">1회</div>
        <div class="tag" data-value="2">2회</div>
        <div class="tag" data-value="3">3회</div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">과목</span>
      <div id="filter-subject" style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="tag active" data-value="all">전체</div>
        <div class="tag" data-value="1">1과목 · 일반화학</div>
        <div class="tag" data-value="2">2과목 · 화재예방·소화</div>
        <div class="tag" data-value="3">3과목 · 위험물 성질·취급</div>
      </div>
    </div>
  </div>

  <!-- 진행률 -->
  <div class="progress-bar-wrap">
    <span class="progress-info"><strong id="cnt-done">0</strong> / <span id="cnt-total">0</span> 문제</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-pool" id="stat-pool">총 0문제</span>
  </div>

  <!-- 문제 영역 -->
  <div class="quiz-area" id="quiz-area">
    <div class="loading-card">문제를 불러오는 중입니다…</div>
  </div>

  <!-- 전체 문제 풀이 완료 -->
  <div class="done-card" id="done-card">
    <div class="done-icon">🎉</div>
    <div class="done-title">수고하셨습니다!</div>
    <div class="done-desc" id="done-desc">모든 문제를 풀었습니다.</div>
    <button class="done-btn" onclick="restart()">🔄 다시 섞어서 풀기</button>
  </div>

  <!-- 필터 결과 없음 -->
  <div class="empty-msg" id="empty-msg">
    선택하신 조건에 해당하는 문제가 없어요. 필터를 조정해보세요.
  </div>
</main>

<footer class="footer" id="footer-text">위험물산업기사 필기 기출문제 복원풀이 자료</footer>

<script src="hm_stats.js"></script>
<script>
var curYear = 'all';
var curRoundNum = 'all';
var curSubject = 'all';
var pool = [];
var cursor = 0;
var questions = [];
var subjectNames = {};
var formatRoundLabel = null;
var selectedIdx = null;
var revealed = false;

function escapeHTML(s) {
  if (s == null) return '';
  s = String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function nl2brHTML(s) { return escapeHTML(s).replace(/\n/g, "<br>"); }

/* 선택지 렌더링: <img로 시작하면 HTML 그대로, 아니면 escape (stem과 동일 처리) */
function renderChoice(c) {
  return (typeof c === 'string' && c.indexOf('<img') === 0) ? c : escapeHTML(c);
}

HmStats.load(function(stats) {
  questions = stats.questions;
  subjectNames = stats.subjectNames;
  formatRoundLabel = stats.formatRoundLabel;
  document.getElementById('header-badge').textContent = stats.totalQ + '문항';

  /* 연도 필터 탭 동적 생성 (최신 → 과거) */
  var yearContainer = document.getElementById('filter-year');
  var years = [];
  stats.rounds.forEach(function(r) {
    var y = r.split('-')[0];
    if (years.indexOf(y) === -1) years.push(y);
  });
  years.sort(function(a,b){ return parseInt(b,10) - parseInt(a,10); });
  years.forEach(function(y) {
    var tag = document.createElement('div');
    tag.className = 'tag';
    tag.dataset.value = y;
    tag.textContent = '20' + y + '년';
    yearContainer.appendChild(tag);
  });

  bindFilter('filter-year', function(v) { curYear = v; });
  bindFilter('filter-round', function(v) { curRoundNum = v; });
  bindFilter('filter-subject', function(v) { curSubject = v; });

  rebuildPool();

  document.getElementById('footer-text').textContent =
    '위험물산업기사 필기 기출문제 복원풀이 · ' + stats.minYear + '~' + stats.maxYear + '년 · ' + stats.totalRounds + '개 회차';
});

function bindFilter(containerId, setter) {
  var container = document.getElementById(containerId);
  container.addEventListener('click', function(e) {
    var tag = e.target.closest('.tag');
    if (!tag) return;
    container.querySelectorAll('.tag').forEach(function(t) { t.classList.remove('active'); });
    tag.classList.add('active');
    setter(tag.dataset.value);
    rebuildPool();
  });
}

function rebuildPool() {
  var filtered = questions.filter(function(q) {
    var parts = String(q.round).split('-');
    var year = parts[0], rNum = parts[1];
    var yOk = curYear === 'all' || year === curYear;
    var rOk = curRoundNum === 'all' || rNum === curRoundNum;
    var sOk = curSubject === 'all' || String(q.subject) === curSubject;
    return yOk && rOk && sOk;
  });

  /* Fisher-Yates 셔플 */
  var arr = filtered.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  pool = arr;
  cursor = 0;
  selectedIdx = null;
  revealed = false;
  updateProgress();
  showQuestion();
}

function updateProgress() {
  var total = pool.length;
  var done = cursor;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('stat-pool').textContent = '총 ' + total + '문제';
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showQuestion() {
  var area = document.getElementById('quiz-area');
  var doneCard = document.getElementById('done-card');
  var emptyMsg = document.getElementById('empty-msg');
  doneCard.classList.remove('show');
  emptyMsg.classList.remove('show');
  area.innerHTML = '';

  if (pool.length === 0) {
    emptyMsg.classList.add('show');
    return;
  }
  if (cursor >= pool.length) {
    document.getElementById('done-desc').textContent =
      '랜덤 퀴즈 ' + pool.length + '문제를 모두 풀었어요!\n다시 섞어서 풀어보며 실력을 다져보세요.';
    doneCard.classList.add('show');
    return;
  }

  var q = pool[cursor];
  selectedIdx = null;
  revealed = false;

  var subjectClass = 's' + q.subject;
  var subjectLabel = q.subject + '과목 · ' + subjectNames[q.subject];
  var CIRCLE = ['①', '②', '③', '④', '⑤'];

  var choicesHTML = q.choices.map(function(c, i) {
    var idx = i + 1;
    return (
      '<li class="choice" data-idx="' + idx + '">' +
        '<span class="choice__num">' + CIRCLE[i] + '</span>' +
        '<span class="choice__body">' + renderChoice(c) + '</span>' +
      '</li>'
    );
  }).join('');

  /* sub / subHTML / notice 필드 처리 */
  var subBlock = '';
  if (q.subHTML) {
    subBlock = '<div class="q-sub q-sub--svg">' + q.subHTML + '</div>';
  } else if (q.sub) {
    subBlock = '<div class="q-sub">' + nl2brHTML(q.sub) + '</div>';
  }
  var noticeBlock = q.notice ? '<div class="q-notice">' + q.notice + '</div>' : '';

  var roundLabel = formatRoundLabel ? formatRoundLabel(q.round) : q.round;
  var cardCls = 'quiz-card' + (q.notice ? ' card--notice' : '');

  var card = document.createElement('div');
  card.className = cardCls;
  card.id = 'current-card';
  card.innerHTML =
    noticeBlock +
    '<div class="card-meta">' +
      '<span class="meta-round">' + roundLabel + '</span>' +
      '<span class="meta-subject ' + subjectClass + '">' + subjectLabel + '</span>' +
      '<span class="meta-no">Q.' + String(q.no).padStart(2,'0') + ' &middot; ' + (cursor + 1) + ' / ' + pool.length + '</span>' +
    '</div>' +
    '<div class="q-text">' + q.stem + '</div>' +
    subBlock +
    '<ul class="choices">' + choicesHTML + '</ul>' +
    '<div class="card-actions">' +
      '<button class="btn-skip" onclick="skip()">건너뛰기</button>' +
      '<button class="btn-check" id="btn-check" onclick="checkAnswer()" disabled>정답 확인</button>' +
    '</div>' +
    '<div class="answer-wrap" id="answer-wrap"></div>';

  area.appendChild(card);

  /* 보기 클릭 */
  card.querySelectorAll('.choice').forEach(function(el) {
    el.addEventListener('click', function() {
      if (revealed) return;
      card.querySelectorAll('.choice').forEach(function(c) { c.classList.remove('selected'); });
      el.classList.add('selected');
      selectedIdx = parseInt(el.dataset.idx, 10);
      document.getElementById('btn-check').disabled = false;
    });
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkAnswer() {
  if (selectedIdx == null) return;
  var q = pool[cursor];
  var card = document.getElementById('current-card');
  revealed = true;
  card.classList.add('revealed');

  /* 정답/오답 표시 */
  card.querySelectorAll('.choice').forEach(function(el) {
    var idx = parseInt(el.dataset.idx, 10);
    if (idx === q.answer) el.classList.add('is-correct');
    if (el.classList.contains('selected') && idx !== q.answer) el.classList.add('is-wrong');
  });

  /* 해설 렌더링 */
  var CIRCLE = ['①', '②', '③', '④', '⑤'];
  var answerHTML =
    '<div class="answer-label">✓ 정답</div>' +
    '<div class="answer-val">' +
      '<span class="answer-val__num">' + CIRCLE[q.answer - 1] + '</span>' +
      '<span>' + renderChoice(q.choices[q.answer - 1]) + '</span>' +
    '</div>';

  if (q.explain) {
    answerHTML +=
      '<div class="exp-section">' +
        '<div class="exp-section-label">해설</div>' +
        '<div class="exp-body">' + q.explain + '</div>' +
      '</div>';
  }

  if (q.keywords && q.keywords.length) {
    var kwHTML = q.keywords.map(function(k) {
      return '<span class="kw-pill">#' + escapeHTML(k) + '</span>';
    }).join('');
    answerHTML +=
      '<div class="keyword-section">' +
        '<div class="keyword-group">' +
          '<div class="keyword-label">핵심 키워드</div>' +
          '<div class="keyword-pills">' + kwHTML + '</div>' +
        '</div>' +
      '</div>';
  }

  var aw = document.getElementById('answer-wrap');
  aw.innerHTML = answerHTML;
  aw.classList.add('open');

  var actions = card.querySelector('.card-actions');
  actions.innerHTML = '<button class="btn-next" onclick="nextQuestion()">다음 문제 →</button>';

  cursor++;
  updateProgress();
}

function nextQuestion() { showQuestion(); }

function skip() {
  var cur = pool.splice(cursor, 1)[0];
  pool.push(cur);
  showQuestion();
}

function restart() { rebuildPool(); }
</script>
</body>
</html>
