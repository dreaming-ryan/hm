<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회차별 기출문제 — 위험물산업기사 필기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F2;--surface:#FFFFFF;--border:#E1E5DE;
  --text-main:#1F2421;--text-sub:#5F6B63;--text-muted:#9BA69F;
  --point:#0F766E;--point-l:#E0F5F2;
  --r-lg:18px;--r-md:12px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 20px rgba(0,0,0,.09);--sh-lg:0 12px 40px rgba(0,0,0,.12)
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.site-header{width:100%;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:500;color:var(--text-sub);padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all .15s;flex-shrink:0}
.back-btn:hover{color:var(--text-main);border-color:#ccc}
.header-title{font-size:15px;font-weight:600;color:var(--text-main)}
.header-badge{margin-left:auto;font-size:12px;font-weight:500;color:var(--point);background:var(--point-l);padding:4px 12px;border-radius:20px}
.main{width:100%;max-width:680px;padding:2.5rem 1.5rem 6rem}
.page-hero{margin-bottom:2rem;animation:fadeUp .5s ease both}
.page-hero h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:5px}
.page-hero p{font-size:13px;color:var(--text-sub)}
.skel{display:inline-block;background:linear-gradient(90deg,#e0e5dc 25%,#f4f7f2 50%,#e0e5dc 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;vertical-align:middle}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.footer{text-align:center;font-size:12px;color:var(--text-muted);padding:1.5rem;border-top:1px solid var(--border);width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.year-section{margin-bottom:1.4rem;animation:fadeUp .5s ease both}
.year-label{font-size:12px;font-weight:700;color:var(--text-sub);letter-spacing:.06em;margin-bottom:.6rem;padding-left:.2rem}
.rounds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.round-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:1.4rem 1.2rem 1.1rem;text-decoration:none;display:flex;flex-direction:column;gap:8px;transition:all .18s ease;position:relative;overflow:hidden;box-shadow:var(--sh-sm);cursor:pointer;animation:fadeUp .5s ease both}
.round-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--point);transform:scaleX(0);transform-origin:left;transition:transform .2s ease}
.round-card:hover{border-color:var(--point-l);box-shadow:var(--sh-md);transform:translateY(-2px)}
.round-card:hover::after{transform:scaleX(1)}
.round-badge{font-size:10px;font-weight:600;color:var(--point);background:var(--point-l);padding:2px 8px;border-radius:6px;display:inline-block;width:fit-content}
.round-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--text-main);letter-spacing:-.02em;line-height:1.3}
.round-count{font-size:12px;font-weight:600;color:var(--text-sub);display:flex;align-items:center;gap:4px;margin-top:2px}
.round-arrow{position:absolute;bottom:14px;right:16px;font-size:14px;color:var(--text-muted);transition:transform .18s,color .18s}
.round-card:hover .round-arrow{transform:translate(2px,-2px);color:var(--point)}
.placeholder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.placeholder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:1.4rem 1.2rem 1.1rem;height:120px}
.section-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem 1.4rem;margin-bottom:1.6rem;font-size:13px;color:var(--text-sub);line-height:1.65}
.section-summary strong{color:var(--point);font-weight:700}
.pdf-btn-wrap{display:flex;justify-content:center;margin-bottom:2rem;animation:fadeUp .5s .08s ease both}
.pdf-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:50px;background:linear-gradient(135deg,#0F766E 0%,#0B5C55 100%);color:#fff;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:-.02em;box-shadow:0 4px 18px rgba(15,118,110,.38);transition:all .22s ease;white-space:nowrap;text-align:left}
.pdf-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,118,110,.50);filter:brightness(1.07)}
.pdf-btn:active{transform:translateY(0);box-shadow:0 3px 10px rgba(15,118,110,.30)}
.pdf-btn-icon{font-size:18px;line-height:1;flex-shrink:0}
@media(max-width:480px){.rounds-grid,.placeholder-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="site-header">
  <a class="back-btn" href="index.html">← 홈</a>
  <span class="header-title">📅 회차별 기출문제</span>
  <span class="header-badge" id="header-badge">로딩 중…</span>
</header>
<main class="main">
  <div class="page-hero">
    <h1>회차별 기출문제 풀기</h1>
    <p>원하는 회차를 선택하면 해당 회차의 기출문제만 모아서 풀 수 있어요.</p>
  </div>

  <!-- PDF 요약노트 다운로드 버튼 -->
  <div class="pdf-btn-wrap">
    <a class="pdf-btn"
       href="https://dreaming-ryan.com/home?product=%EC%9C%84%ED%97%98%EB%AC%BC%EC%82%B0%EC%97%85%EA%B8%B0%EC%82%AC%20%EC%9A%94%EC%95%BD%EB%85%B8%ED%8A%B8%20PDF%20(%ED%95%84%EA%B8%B0)"
       target="_blank"
       rel="noopener noreferrer">
      <span class="pdf-btn-icon">📙</span>
      <span style="display:flex;flex-direction:column;align-items:flex-start;gap:2px">
        <span>위산기 필기 요약노트 PDF</span>
        <span style="font-size:13px;font-weight:500;opacity:.9">무료 다운받기</span>
      </span>
    </a>
  </div>

  <div class="section-summary" id="summary">
    <span class="skel" style="width:80%;height:14px;display:block"></span>
  </div>

  <div id="rounds-container">
    <div class="placeholder-grid">
      <div class="placeholder-card"><span class="skel" style="width:60%;height:14px;display:block;margin-bottom:10px"></span><span class="skel" style="width:80%;height:22px;display:block;margin-bottom:8px"></span><span class="skel" style="width:50%;height:12px;display:block"></span></div>
      <div class="placeholder-card"><span class="skel" style="width:60%;height:14px;display:block;margin-bottom:10px"></span><span class="skel" style="width:80%;height:22px;display:block;margin-bottom:8px"></span><span class="skel" style="width:50%;height:12px;display:block"></span></div>
      <div class="placeholder-card"><span class="skel" style="width:60%;height:14px;display:block;margin-bottom:10px"></span><span class="skel" style="width:80%;height:22px;display:block;margin-bottom:8px"></span><span class="skel" style="width:50%;height:12px;display:block"></span></div>
      <div class="placeholder-card"><span class="skel" style="width:60%;height:14px;display:block;margin-bottom:10px"></span><span class="skel" style="width:80%;height:22px;display:block;margin-bottom:8px"></span><span class="skel" style="width:50%;height:12px;display:block"></span></div>
    </div>
  </div>
</main>
<footer class="footer" id="footer-text">위험물산업기사 필기 기출문제 복원풀이 자료</footer>
<script src="hm_stats.js"></script>
<script>
HmStats.load(function(s) {
  document.getElementById('header-badge').textContent = s.totalRounds + '개 회차';

  var minLabel = s.formatRoundLabel(s.rounds[0]);
  var maxLabel = s.formatRoundLabel(s.rounds[s.rounds.length - 1]);
  document.getElementById('summary').innerHTML =
    '총 <strong>' + s.totalRounds + '개 회차</strong>, <strong>' + s.totalQ + '문항</strong>의 기출문제를 수록하고 있어요. ' +
    '(<strong>' + minLabel + ' ~ ' + maxLabel + '</strong>)';

  /* 연도별로 그룹화하여 표시 (최신 연도 → 과거) */
  var byYear = {};
  s.rounds.forEach(function(r) {
    var y = r.split('-')[0];
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(r);
  });
  var years = Object.keys(byYear).sort(function(a,b){ return parseInt(b,10) - parseInt(a,10); }); // 최신 연도부터

  var container = document.getElementById('rounds-container');
  container.innerHTML = '';

  var totalCardIdx = 0;
  years.forEach(function(y, yi) {
    var section = document.createElement('div');
    section.className = 'year-section';
    section.style.animationDelay = (yi * 0.05) + 's';

    var label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = '20' + y + '년';
    section.appendChild(label);

    var grid = document.createElement('div');
    grid.className = 'rounds-grid';

    /* 같은 연도 안에서는 회차 내림차순 */
    var rs = byYear[y].slice().sort(function(a,b){
      return parseInt(b.split('-')[1],10) - parseInt(a.split('-')[1],10);
    });

    rs.forEach(function(round) {
      var count = s.roundMap[round] || 0;
      var href = 'hm_quiz.html?round=' + encodeURIComponent(round);
      var card = document.createElement('a');
      card.className = 'round-card';
      card.href = href;
      card.style.animationDelay = (totalCardIdx * 0.04) + 's';
      totalCardIdx++;
      var parts = round.split('-');
      card.innerHTML =
        '<span class="round-badge">위험물산업기사 ' + parts[1] + '회</span>' +
        '<div class="round-title">' + s.formatRoundLabel(round) + '<br>기출문제</div>' +
        '<div class="round-count">📝 ' + count + '문항</div>' +
        '<span class="round-arrow">↗</span>';
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });

  document.getElementById('footer-text').textContent =
    '위험물산업기사 필기 기출문제 복원풀이 · ' + s.minYear + '~' + s.maxYear + '년 · ' + s.totalRounds + '개 회차';
});
</script>
</body>
</html>
